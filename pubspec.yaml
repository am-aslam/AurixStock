name: aurix_stock
description: AurixStock - Premium Gold Stock Manager
publish_to: "none"
version: 2.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  shimmer: ^3.0.0

  # Charts
  fl_chart: ^0.68.0

  # SVG Icons
  flutter_svg: ^2.0.10+1

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # Export
  pdf: ^3.11.0
  printing: ^5.14.0
  csv: ^6.0.0
  share_plus: ^12.0.0

  # App Lock
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # Navigation
  go_router: ^14.2.7

  # Misc
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
